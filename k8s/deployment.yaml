apiVersion: apps/v1
kind: Deployment
metadata:
  name: bartek-adk-agent
  # namespace is set via: kubectl apply -n <namespace>
  labels:
    app: bartek-adk-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bartek-adk-agent
  template:
    metadata:
      labels:
        app: bartek-adk-agent
    spec:
      # Workload Identity: this K8s SA is mapped to GCP SA ${GKE_SERVICE_ACCOUNT_NAME}
      # The GCP SA needs 'aiplatform.endpoints.predict' permission on project ${GOOGLE_CLOUD_PROJECT}
      serviceAccountName: ${GKE_SERVICE_ACCOUNT_NAME}
      containers:
        - name: bartek-adk-agent
          image: ${AGENT_IMAGE_URI}
          ports:
            - containerPort: 8000
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "TRUE"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10

