apiVersion: apps/v1
kind: Deployment
metadata:
  name: bartek-adk-agent
  # namespace is set via: kubectl apply -n <namespace>
  labels:
    app: bartek-adk-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bartek-adk-agent
  template:
    metadata:
      labels:
        app: bartek-adk-agent
    spec:
      # Workload Identity: this K8s SA is mapped to GCP SA ${GKE_SERVICE_ACCOUNT_NAME}
      # The GCP SA needs 'aiplatform.endpoints.predict' permission on project ${GOOGLE_CLOUD_PROJECT}
      serviceAccountName: ${GKE_SERVICE_ACCOUNT_NAME}
      containers:
        # --- ADK Web UI (port 8000) ---
        - name: adk-web
          image: ${AGENT_IMAGE_URI}
          ports:
            - containerPort: 8000
              name: http-web
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "TRUE"
            - name: SERVE_MODE
              value: "adk"
            - name: APP_PORT
              value: "8000"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
        # --- A2A JSONRPC Server (port 8001) ---
        - name: a2a
          image: ${AGENT_IMAGE_URI}
          ports:
            - containerPort: 8001
              name: http-a2a
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "TRUE"
            - name: SERVE_MODE
              value: "a2a"
            - name: APP_PORT
              value: "8001"
            - name: A2A_AGENT_MODULE
              value: "${A2A_AGENT_MODULE}"
            # Public-facing A2A metadata (agent card URL).
            # These control what the agent card advertises — not the listen port.
            - name: A2A_PORT
              value: "443"
            - name: A2A_PROTOCOL
              value: "https"
            - name: A2A_HOST
              value: "bartek-adk-agent-a2a-${GKE_NAMESPACE}.${GKE_CLUSTER_SUBDOMAIN_INFIX}.${GKE_CLUSTER_REGION}.dev.${GKE_HTTP_URL_DOMAIN}"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /.well-known/agent-card.json
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10

