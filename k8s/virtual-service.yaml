apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  labels:
    app: bartek-adk-agent
  name: bartek-adk-agent
  namespace: ${GKE_NAMESPACE}
spec:
  gateways:
    - istio-system/apps-internal-gateway
    - mesh
  hosts:
    - bartek-adk-agent-${GKE_NAMESPACE}.${GKE_CLUSTER_SUBDOMAIN_INFIX}.${GKE_CLUSTER_REGION}.${GKE_HTTP_URL_DOMAIN}
    - bartek-adk-agent-a2a-${GKE_NAMESPACE}.${GKE_CLUSTER_SUBDOMAIN_INFIX}.${GKE_CLUSTER_REGION}.${GKE_HTTP_URL_DOMAIN}
  http:
    # A2A traffic (matched by host) → port 8001
    - match:
        - headers:
            ":authority":
              prefix: bartek-adk-agent-a2a-
      route:
        - destination:
            host: bartek-adk-agent.${GKE_NAMESPACE}.svc.cluster.local
            port:
              number: 8001
    # Default: ADK Web UI → port 8000
    - route:
        - destination:
            host: bartek-adk-agent.${GKE_NAMESPACE}.svc.cluster.local
            port:
              number: 8000

